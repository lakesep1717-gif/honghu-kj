<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跨境电商RPA场景库 - 301个自动化机会点</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      color: #1a1a1a;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .header-stats {
      display: flex;
      gap: 24px;
      font-size: 14px;
      opacity: 0.9;
    }
    .header-stats span { display: flex; align-items: center; gap: 6px; }
    
    /* Top Filter Bar */
    .top-filter {
      background: white;
      padding: 16px 32px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-group { display: flex; gap: 8px; align-items: center; }
    .filter-label { font-size: 14px; color: #666; font-weight: 500; }
    .filter-btn {
      padding: 6px 16px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #667eea; color: #667eea; }
    .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    
    /* Search */
    .search-box {
      position: relative;
      margin-left: auto;
    }
    .search-box input {
      width: 280px;
      padding: 8px 36px 8px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
    }
    .search-box input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    /* Main Layout */
    .main {
      display: flex;
      height: calc(100vh - 140px);
    }
    
    /* Sidebar */
    .sidebar {
      width: 220px;
      background: white;
      border-right: 1px solid #e8e8e8;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 16px 20px;
      font-size: 12px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dept-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .dept-item:hover { background: #f5f7fa; }
    .dept-item.active {
      background: #f0f5ff;
      border-left-color: #667eea;
      color: #667eea;
    }
    .dept-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 16px;
    }
    .dept-info { flex: 1; }
    .dept-name { font-size: 14px; font-weight: 500; }
    .dept-count {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .dept-item.active .dept-count { color: #667eea; }
    
    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }
    
    /* Dept Header */
    .dept-header {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .dept-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .dept-title h2 { font-size: 20px; font-weight: 600; }
    .dept-desc { color: #666; font-size: 14px; margin-bottom: 16px; }
    .dept-metrics {
      display: flex;
      gap: 32px;
    }
    .metric {
      text-align: center;
    }
    .metric-value {
      font-size: 28px;
      font-weight: 700;
      color: #667eea;
    }
    .metric-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    
    /* Scenario Cards */
    .scenario-list { display: flex; flex-direction: column; gap: 16px; }
    
    .scenario-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.2s;
    }
    .scenario-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    
    .scenario-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .scenario-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .scenario-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-platform { background: #e6f7ff; color: #1890ff; }
    .tag-model { background: #f6ffed; color: #52c41a; }
    .tag-type-hot { background: #fff2f0; color: #ff4d4f; }
    .tag-type-fast { background: #fff7e6; color: #fa8c16; }
    .tag-type-potential { background: #f9f0ff; color: #722ed1; }
    .tag-tech {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .tech-rpa { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
    .tech-ai { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .tech-api { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffa39e; }
    
    .scenario-desc {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    
    /* Value Props */
    .value-props {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .value-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .value-icon { font-size: 16px; }
    .value-text { color: #333; }
    .value-highlight { color: #52c41a; font-weight: 600; }
    
    /* SOP Section */
    .sop-section {
      border-top: 1px solid #f0f0f0;
      padding-top: 16px;
    }
    .sop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .sop-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sop-toggle {
      font-size: 12px;
      color: #667eea;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sop-content {
      display: none;
      background: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
      line-height: 1.8;
    }
    .sop-content.show { display: block; }
    .sop-step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    .sop-step-num {
      width: 20px;
      height: 20px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #bfbfbf; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>🚀 跨境电商RPA场景库</h1>
    <div class="header-stats">
      <span>📊 <strong id="totalCount">301</strong> 个自动化机会点</span>
      <span>🏢 <strong>13</strong> 个平台</span>
      <span>👥 <strong>8</strong> 大部门</span>
      <span>⚡ 平均节省 <strong>2-4小时</strong>/天</span>
    </div>
  </div>
  
  <!-- Top Filter -->
  <div class="top-filter">
    <div class="filter-group">
      <span class="filter-label">技术类型</span>
      <div id="techFilters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">业务模式</span>
      <div id="modelFilters"></div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索场景、平台、关键词...">
    </div>
  </div>
  
  <!-- Main -->
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">部门导航</div>
      <div id="deptSidebar"></div>
    </div>
    
    <!-- Content -->
    <div class="content">
      <div id="deptHeader"></div>
      <div id="scenarioList" class="scenario-list"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">🔎</div>
        <p>没有找到匹配的场景，试试调整筛选条件</p>
      </div>
    </div>
  </div>

<script>
// ===========================
// DATA - 301 Scenarios with Value Props
// ===========================
const DEPTS = [
  {name:"全部", icon:"🏢", color:"#667eea", desc:"覆盖跨境电商全链路自动化场景"},
  {name:"运营", icon:"📈", color:"#52c41a", desc:"商品上架、数据分析、竞品监控、广告投放"},
  {name:"财务", icon:"💰", color:"#fa8c16", desc:"对账、报表、成本核算、资金管理"},
  {name:"供应链", icon:"📦", color:"#1890ff", desc:"库存管理、采购、物流、仓储"},
  {name:"客服", icon:"💬", color:"#eb2f96", desc:"售后处理、评价管理、客户维护"},
  {name:"人事", icon:"👥", color:"#722ed1", desc:"招聘、考勤、薪酬、员工管理"},
  {name:"管理", icon:"⚙️", color:"#13c2c2", desc:"决策支持、项目管理、协同办公"},
  {name:"合规", icon:"🛡️", color:"#f5222d", desc:"政策监控、知识产权、税务合规"},
  {name:"技术", icon:"🔧", color:"#595959", desc:"系统监控、数据备份、安全审计"},
];

const TECHS = ["全部", "RPA", "AI", "API"];
const MODELS = ["全部模式", "品牌型", "精品型", "精铺型", "铺货型", "通用"];

// Sample scenarios with value props (showing first 20 as example)
const SCENARIOS = [
  // 运营 - 亚马逊
  {name:"商品详情批量采集", platform:"亚马逊", model:"品牌型", type:"hot", tech:"RPA", dept:"运营", 
   desc:"批量采集竞品ASIN的标题、价格、评分、问答数等核心数据，一键生成竞品分析表",
   sop:["读取ASIN列表","打开详情页抓取数据","提取标题/价格/评分/问答数","保存到Excel生成报告"],
   saveTime:"每天节省2-3小时", saveCost:"减少1名数据专员", efficiency:"效率提升10倍"},
  
  {name:"关键词排名监控", platform:"亚马逊", model:"品牌型", type:"hot", tech:"RPA", dept:"运营",
   desc:"每日自动监控核心关键词的自然排名和广告排名变化，追踪SEO效果",
   sop:["读取关键词列表","逐个搜索记录排名","对比历史数据","生成排名趋势表"],
   saveTime:"每天节省1.5小时", saveCost:"", efficiency:"数据准确率100%"},
  
  {name:"跟卖监控与投诉", platform:"亚马逊", model:"品牌型", type:"hot", tech:"RPA+API", dept:"运营",
   desc:"24小时监控跟卖，发现后自动发起投诉，保护Listing",
   sop:["扫描产品Listing","识别跟卖卖家","记录跟卖信息","自动发起投诉"],
   saveTime:"7×24小时监控", saveCost:"减少损失", efficiency:"响应时间<5分钟"},
  
  {name:"广告数据日报", platform:"亚马逊", model:"品牌型", type:"fast", tech:"RPA", dept:"财务",
   desc:"每日自动导出广告报表，汇总花费、点击、转化数据，计算ACOS",
   sop:["登录广告后台","导出昨日数据","计算ACOS/ROAS","发送日报邮件"],
   saveTime:"每天节省1小时", saveCost:"", efficiency:"零人工误差"},
  
  {name:"FBA库存预警", platform:"亚马逊", model:"品牌型", type:"hot", tech:"RPA+API", dept:"供应链",
   desc:"自动监控FBA库存，低于安全库存自动发邮件通知采购补货",
   sop:["登录后台导出库存","对比安全库存阈值","识别低库存SKU","发送预警邮件"],
   saveTime:"每天节省2小时", saveCost:"避免断货损失", efficiency:"预警及时率100%"},
  
  {name:"评价监控与预警", platform:"亚马逊", model:"品牌型", type:"fast", tech:"RPA", dept:"客服",
   desc:"实时监控新增Review，差评自动预警，快速响应处理",
   sop:["读取产品列表","抓取最新Review","识别差评(<3星)","发送预警通知"],
   saveTime:"实时响应", saveCost:"提升客户满意度", efficiency:"差评处理时效提升80%"},
  
  // 更多场景... (实际使用时加载完整301个)
];

// ===========================
// STATE
// ===========================
let activeDept = "全部";
let activeTech = "全部";
let activeModel = "全部模式";
let searchKeyword = "";

// ===========================
// RENDER
// ===========================
function render() {
  // Filter scenarios
  let filtered = SCENARIOS.filter(s => {
    if (activeDept !== "全部" && s.dept !== activeDept) return false;
    if (activeTech !== "全部" && !s.tech.includes(activeTech)) return false;
    if (activeModel !== "全部模式" && s.model !== activeModel) return false;
    if (searchKeyword) {
      const kw = searchKeyword.toLowerCase();
      const text = [s.name, s.desc, s.platform, s.model, s.dept].join(' ').toLowerCase();
      if (!text.includes(kw)) return false;
    }
    return true;
  });
  
  // Update header stats
  document.getElementById('totalCount').textContent = filtered.length;
  
  // Render dept header
  renderDeptHeader(filtered);
  
  // Render scenario list
  const listEl = document.getElementById('scenarioList');
  const emptyEl = document.getElementById('emptyState');
  
  if (filtered.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    listEl.innerHTML = filtered.map(s => renderScenarioCard(s)).join('');
  }
}

function renderDeptHeader(scenarios) {
  const dept = DEPTS.find(d => d.name === activeDept);
  const count = scenarios.length;
  const platforms = new Set(scenarios.map(s => s.platform)).size;
  
  document.getElementById('deptHeader').innerHTML = `
    <div class="dept-header">
      <div class="dept-title">
        <span style="font-size:32px">${dept.icon}</span>
        <h2>${dept.name}自动化场景</h2>
      </div>
      <div class="dept-desc">${dept.desc}</div>
      <div class="dept-metrics">
        <div class="metric">
          <div class="metric-value">${count}</div>
          <div class="metric-label">自动化机会点</div>
        </div>
        <div class="metric">
          <div class="metric-value">${platforms}</div>
          <div class="metric-label">覆盖平台</div>
        </div>
        <div class="metric">
          <div class="metric-value">2-4h</div>
          <div class="metric-label">日均节省时间</div>
        </div>
      </div>
    </div>
  `;
}

function renderScenarioCard(s) {
  const typeClass = s.type === 'hot' ? 'tag-type-hot' : s.type === 'fast' ? 'tag-type-fast' : 'tag-type-potential';
  const typeText = s.type === 'hot' ? '🔥高频刚需' : s.type === 'fast' ? '⚡提效显著' : '🌱潜力场景';
  const techClass = s.tech.includes('AI') ? 'tech-ai' : s.tech.includes('API') ? 'tech-api' : 'tech-rpa';
  
  return `
    <div class="scenario-card">
      <div class="scenario-header">
        <div>
          <div class="scenario-title">${s.name}</div>
          <div class="scenario-tags">
            <span class="tag tag-platform">${s.platform}</span>
            <span class="tag tag-model">${s.model}</span>
            <span class="tag ${typeClass}">${typeText}</span>
            <span class="tag-tech ${techClass}">${s.tech}</span>
          </div>
        </div>
      </div>
      <div class="scenario-desc">${s.desc}</div>
      <div class="value-props">
        ${s.saveTime ? `<div class="value-item"><span class="value-icon">⏱️</span><span class="value-text">${s.saveTime}</span></div>` : ''}
        ${s.saveCost ? `<div class="value-item"><span class="value-icon">💰</span><span class="value-text value-highlight">${s.saveCost}</span></div>` : ''}
        ${s.efficiency ? `<div class="value-item"><span class="value-icon">📈</span><span class="value-text value-highlight">${s.efficiency}</span></div>` : ''}
      </div>
      <div class="sop-section">
        <div class="sop-header">
          <div class="sop-title">📋 实现步骤</div>
          <div class="sop-toggle" onclick="toggleSop(this)">展开详情 <span>▼</span></div>
        </div>
        <div class="sop-content">
          ${s.sop.map((step, i) => `
            <div class="sop-step">
              <div class="sop-step-num">${i+1}</div>
              <div>${step}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function toggleSop(el) {
  const content = el.parentElement.nextElementSibling;
  const arrow = el.querySelector('span');
  content.classList.toggle('show');
  arrow.textContent = content.classList.contains('show') ? '▲' : '▼';
  el.innerHTML = content.classList.contains('show') ? '收起详情 <span>▲</span>' : '展开详情 <span>▼</span>';
}

// ===========================
// SIDEBAR & FILTERS
// ===========================
function renderSidebar() {
  const counts = {};
  DEPTS.forEach(d => counts[d.name] = 0);
  SCENARIOS.forEach(s => { if(counts[s.dept] !== undefined) counts[s.dept]++; });
  counts["全部"] = SCENARIOS.length;
  
  document.getElementById('deptSidebar').innerHTML = DEPTS.map(d => `
    <div class="dept-item ${d.name === activeDept ? 'active' : ''}" onclick="setDept('${d.name}')">
      <div class="dept-icon" style="background:${d.color}15;color:${d.color}">${d.icon}</div>
      <div class="dept-info">
        <div class="dept-name">${d.name}</div>
        <div class="dept-count">${counts[d.name]} 个场景</div>
      </div>
    </div>
  `).join('');
}

function renderFilters() {
  document.getElementById('techFilters').innerHTML = TECHS.map(t => `
    <button class="filter-btn ${t === activeTech ? 'active' : ''}" onclick="setTech('${t}')">${t}</button>
  `).join('');
  
  document.getElementById('modelFilters').innerHTML = MODELS.map(m => `
    <button class="filter-btn ${m === activeModel ? 'active' : ''}" onclick="setModel('${m}')">${m}</button>
  `).join('');
}

function setDept(d) { activeDept = d; renderSidebar(); render(); }
function setTech(t) { activeTech = t; renderFilters(); render(); }
function setModel(m) { activeModel = m; renderFilters(); render(); }

// ===========================
// SEARCH
// ===========================
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchKeyword = e.target.value.trim();
  render();
});

// ===========================
// INIT
// ===========================
renderSidebar();
renderFilters();
render();
</script>
</body>
</html>
