let activePlatform = '全部';
let activeDept = '全部';

function getDepts() { return ['全部', ...new Set(allScenes.map(s=>s.department||'运营'))]; }
function getPlatforms() { return ['全部', ...new Set(allScenes.map(s=>s.platform||'通用'))]; }

function renderFilters() {
  const container = document.getElementById('filterBtns');
  const depts = getDepts();
  let html = '<span style="color:#888;font-size:13px;margin-right:10px;">部门：</span>';
  depts.forEach(d => { html += '<button class="filter-btn'+(d==='全部'?' active':'')+'" onclick="setDept(\''+d+'\')">'+d+'</button>'; });
  html += '<span style="color:#888;font-size:13px;margin:0 10px;">平台：</span>';
  getPlatforms().forEach(p => { html += '<button class="filter-btn'+(p==='全部'?' active':'')+'" onclick="setPlatform(\''+p+'\')">'+p+'</button>'; });
  container.innerHTML = html;
}

function setDept(d) { activeDept = d; document.querySelectorAll('#filterBtns .filter-btn').forEach(b => { if(b.textContent===d) b.classList.add('active'); else if(d==='全部'&&b.textContent!=='全部'){/* keep others non-active by clearing active class from non-dept buttons */} }); updateFilters(); }

function setPlatform(p) { activePlatform = p; updateFilters(); }

function updateFilters() {
  document.querySelectorAll('#filterBtns .filter-btn').forEach(b => {
    b.classList.remove('active');
    if (b.textContent === activeDept || b.textContent === activePlatform) b.classList.add('active');
    if (b.textContent === '全部' && (activeDept === '全部' || activePlatform === '全部')) b.classList.add('active');
  });
  filterScenes();
}

function filterScenes() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allScenes.filter(s => {
    const matchDept = activeDept === '全部' || (s.department||'') === activeDept;
    const matchPlatform = activePlatform === '全部' || (s.platform||'') === activePlatform;
    const matchKw = !kw || (s.name||'').toLowerCase().includes(kw) || (s.description||'').toLowerCase().includes(kw);
    return matchDept && matchPlatform && matchKw;
  });
  renderCards(filtered);
}

function renderCards(scenes) {
  document.getElementById('showCount').textContent = scenes.length;
  const grid = document.getElementById('cardGrid');
  if (!scenes.length) { grid.innerHTML = '<p style="text-align:center;color:#888;grid-column:1/-1;">暂无匹配场景</p>'; return; }
  grid.innerHTML = scenes.map(s => {
    const platform = s.platform || '通用';
    const dept = s.department || '运营';
    const name = s.name || '';
    const desc = s.description || '';
    const sop = Array.isArray(s.sop) ? s.sop.join('\n') : (s.sop || '');
    const sopDisplay = sop ? sop.split('\n').map((step,i) => (i+1) + '. ' + step).join('\n') : '暂无SOP';
    return '<div class="card">' +
      '<div class="tags">' +
        '<span class="tag tag-platform">'+platform+'</span>' +
        '<span class="tag tag-dept">'+dept+'</span>' +
      '</div>' +
      '<h3>'+name+'</h3>' +
      '<p>'+desc+'</p>' +
      '<button class="sop-toggle" onclick="this.nextElementSibling.classList.toggle(\'show\')">查看SOP</button>' +
      '<div class="sop-box">'+sopDisplay.replace(/\n/g,'<br>')+'</div>' +
    '</div>';
  }).join('');
}

renderFilters();
renderCards(allScenes);
</script>
