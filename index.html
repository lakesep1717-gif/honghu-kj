    .stats {

      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;

      background: white;

    }
    .grid {

      gap: 20px;
    }

      border-radius: 15px;
      padding: 20px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {

      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 1.1em;
      font-weight: 600;
      color: #333;
      flex: 1;
    }
    .card-badges {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: 500;
    }
    .badge-dept { background: #e0e7ff; color: #4338ca; }
    .badge-model { background: #fce7f3; color: #be185d; }
    .badge-type { background: #d1fae5; color: #047857; }
    .badge-platforms { background: #fef3c7; color: #b45309; }
    .card-desc {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .sop-toggle {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85em;
      width: 100%;
      transition: opacity 0.3s;
    }
    .sop-toggle:hover {
      opacity: 0.9;
    }
    .sop-content {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .sop-content.show {
      display: block;
    }
    .sop-step {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed #e2e8f0;
    }
    .sop-step:last-child {
      border-bottom: none;
    }
    .step-num {
      width: 24px;
      height: 24px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8em;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .step-text {
      color: #475569;
      font-size: 0.85em;
    }
  </style>
</head>

    // 初始化筛选器
    const depts = [...new Set(SCENARIOS.map(s => s.dept))].sort();
    const platforms = [...new Set(SCENARIOS.flatMap(s => s.platforms))].sort();
    
    const deptSelect = document.getElementById('deptFilter');
    const platformSelect = document.getElementById('platformFilter');
    
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      deptSelect.appendChild(opt);
    });
    
    platforms.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      platformSelect.appendChild(opt);
    });
    
    function render() {
      const dept = deptSelect.value;
      const platform = platformSelect.value;
      const type = document.getElementById('typeFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = SCENARIOS.filter(s => {
        if (dept && s.dept !== dept) return false;
        if (platform && !s.platforms.includes(platform)) return false;
        if (type && s.type !== type) return false;
        if (search && !s.name.toLowerCase().includes(search) && !s.desc.toLowerCase().includes(search)) return false;
        return true;
      });
      
      const grid = document.getElementById('scenarioGrid');
      grid.innerHTML = filtered.map((s, i) => `
        <div class="card">
          <div class="card-header">
            <div class="card-title">${escapeHtml(s.name)}</div>
          </div>
          <div class="card-badges" style="margin-bottom: 10px;">
            <span class="badge badge-dept">${escapeHtml(s.dept)}</span>
            <span class="badge badge-model">${escapeHtml(s.model)}</span>
            <span class="badge badge-type">${getTypeLabel(s.type)}</span>
          </div>
          <div class="card-desc">${escapeHtml(s.desc)}</div>
          <div class="card-badges" style="margin-bottom: 10px;">
            <span class="badge badge-platforms">${s.platformCount}个平台</span>
          </div>
          <button class="sop-toggle" onclick="toggleSop(${i})">查看SOP (${s.sop.length}步)</button>
          <div class="sop-content" id="sop${i}">
            ${s.sop.map((step, j) => `
              <div class="sop-step">
                <div class="step-num">${j+1}</div>
                <div class="step-text">${escapeHtml(step)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }
    
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    function getTypeLabel(type) {
      const labels = { hot: '热门', fast: '快速见效', potential: '潜力场景' };
      return labels[type] || type;
    }
    
    function toggleSop(index) {
      const el = document.getElementById('sop' + index);
      el.classList.toggle('show');
    }
    
    deptSelect.addEventListener('change', render);
    platformSelect.addEventListener('change', render);
    document.getElementById('typeFilter').addEventListener('change', render);
    document.getElementById('searchInput').addEventListener('input', render);
    
    render();
  </script>
